services:
  buddvisor:
    build: .
    container_name: buddvisor
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      # Persist SQLite database + uploaded documents/embeddings
      - buddvisor-storage:/app/storage
      # Load secrets (JWT_SECRET, ENCRYPTION_KEY, provider keys, SUPERUSER_NAME, etc.)
      - ./.env:/app/.env:ro
    restart: unless-stopped

volumes:
  buddvisor-storage:

