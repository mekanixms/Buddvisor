services:
  badvisor:
    build: .
    container_name: badvisor
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      # Persist SQLite database + uploaded documents/embeddings
      - badvisor-storage:/app/storage
      # Load secrets (JWT_SECRET, ENCRYPTION_KEY, provider keys, SUPERUSER_NAME, etc.)
      - ./.env:/app/.env:ro
    restart: unless-stopped

volumes:
  badvisor-storage:

